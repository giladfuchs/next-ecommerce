version: "3.8"

services:
  postgres:
    image: postgres:17
    container_name: ecommerce-test-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ecommerce_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    volumes:
      - ecommerce_test_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d ecommerce_test"]
      interval: 1s
      timeout: 3s
      retries: 10

volumes:
  ecommerce_test_pgdata:
